    border: 1px solid #444;

// 흰색 → 진한 황토색 팔레트 생성
function generatePalette(n) {
  // start: rgb(255,255,255) → end: rgb(101,55,0) 진한 황토색
  const startR=255, startG=255, startB=255;
  const endR=255,  endG=0,   endB=0;
  const colors = [];
  for (let i = 0; i < n; i++) {
    const t = n === 1 ? 0 : i / (n - 1);
    const r = Math.round(startR + (endR - startR) * t);
    const g = Math.round(startG + (endG - startG) * t);
    const b = Math.round(startB + (endB - startB) * t);
    colors.push(`rgb(${r},${g},${b})`);
  }
  return colors;
}

function getColor(density, thresholds, palette) {
  // 역순으로 체크 (높은 단계부터)
  for (let i = thresholds.length - 1; i >= 0; i--) {
    if (density >= thresholds[i]) return { color: palette[i], undermin: false };
  }
  return { color: palette[0], undermin: true };
}

  const codeSet = new Set(codes.map(c => String(c)));
  return GEOJSON_SGG.features.filter(f => {
    const cd = String(f.properties.sgg_cd || f.properties.SGG_CD || '');
    return codeSet.has(cd);
  });
}

// 센터 선택 처리
function selectCenter(idx) {
  // 같은 버튼 재클릭 → 해제
  // if (activeCenterIdx === idx) {
  //   activeCenterIdx = null;
  //   clearCenterLayers();
  //   document.querySelectorAll('.center-radio-row').forEach(r => r.classList.remove('active'));
  //   // 라디오 버튼 해제 (name 으로 그룹 접근)
  //   const radios = document.querySelectorAll('input[name="center-radio"]');
  //   radios.forEach(r => r.checked = false);
  //   return;
  // }

  activeCenterIdx = idx;
  clearCenterLayers();

  const center = JSON_CENTER[idx];

  // 행 활성 스타일
  document.querySelectorAll('.center-radio-row').forEach((r, i) => {
    // r.classList.toggle('active', i === idx);
    i === Number(idx) ? r.classList.add('active') : r.classList.remove('active');
  });

  // 1) 녹색 점 (CircleMarker) — interactive: false 로 하위 레이어 클릭 방해 안 함
  centerMarker = L.circleMarker([center.lat, center.lng], {
    radius: 10,
    fillColor: '#4caf50',
    fillOpacity: 0.9,
    color: '#2e7d32',
    weight: 2,
    interactive: false,
    pane: 'markerPane'
  }).addTo(map);

  // 2) 시군구 컬러 레이어
  // 3rd → 연한 색, 2nd → 중간 색, 1st → 진한 색
  const tierConfig = [
    { codes: center['3rd'], fillColor: '#99dd9a', fillOpacity: ($3rd.checked) ? 0.7 : 0 },
    { codes: center['2nd'], fillColor: '#99dd9a', fillOpacity: ($2nd.checked) ? 0.7 : 0 },
    { codes: center['1st'], fillColor: '#99dd9a', fillOpacity: ($1st.checked) ? 0.7 : 0 },
    
  ];

  const coloredFeatures = [];
  tierConfig.forEach(({ codes, fillColor, fillOpacity }) => {
    const features = getSggFeaturesByCodes(codes);
    features.forEach(f => coloredFeatures.push({ feature: f, fillColor, fillOpacity }));
  });

  if (coloredFeatures.length > 0) {
    // GeoJSON FeatureCollection 구성
    const fc = {
      type: 'FeatureCollection',
      features: coloredFeatures.map(({ feature, fillColor, fillOpacity }) => ({
        ...feature,
        properties: { ...feature.properties, _fillColor: fillColor, _fillOpacity: fillOpacity }
      }))
    };

    centerSggLayer = L.geoJSON(fc, {
      style: function(feature) {
        return {
          fillColor: feature.properties._fillColor,
          fillOpacity: feature.properties._fillOpacity,
          color: "rgb(0, 0, 255)",
          weight: 1,
          opacity: 1,
          interactive: false,   // ← EMD 팝업 등 하위 레이어 이벤트 방해 안 함
        };
      },
      interactive: false,
      className: 'pass-through',
    }).addTo(map);

    // sggLayer / sidoLayer 위에 올라가되 emdLayer 이벤트는 유지
    // (interactive: false 이므로 클릭·호버 이벤트 모두 통과)
  }

  // 3) 지도 이동
  // map.setView([center.lat, center.lng], 9, { animate: true });
}

// N회전 체크박스 빌드
function buildNth() {
  $1st.addEventListener('change', (e) => {
    // e.target.checked
    let a = document.querySelector('label.center-radio-row.active');
    if (!a) return;

    let idx = a.querySelector("input").value;
    console.log(idx);
    selectCenter(idx);
  });
  $2nd.addEventListener('change', (e) => {
    let a = document.querySelector('label.center-radio-row.active');
    if (!a) return;

    let idx = a.querySelector("input").value;
    console.log(idx);
    selectCenter(idx);
  });
  $3rd.addEventListener('change', (e) => {
    let a = document.querySelector('label.center-radio-row.active');
    if (!a) return;

    let idx = a.querySelector("input").value;
    console.log(idx);
    selectCenter(idx);
  });
}

// 센터 라디오 버튼 빌드
function buildCenterPanel() {
  const container = document.getElementById('center-radio-container');
  container.innerHTML = '';
  JSON_CENTER.forEach((center, idx) => {
    const row = document.createElement('label');
    row.className = 'center-radio-row';
    row.innerHTML = `
      <input type="radio" name="center-radio" value="${idx}">
      <span>${center.name}</span>
    `;
    row.querySelector('input').addEventListener('change', () => selectCenter(idx));
    // label 클릭 시 이미 선택된 경우도 처리
    row.addEventListener('click', (e) => {
      if (e.target.tagName !== 'INPUT' && activeCenterIdx === idx) {
        e.preventDefault();
        selectCenter(idx); // 해제
      }
    });
    container.appendChild(row);
  });
}


function buildLayer(thresholds, palette) {
  if (emdLayer) map.removeLayer(emdLayer);

  emdLayer = L.geoJSON(GEOJSON_EMD, {
    style: function(feature) {
      const d = feature.properties.density || 0;
      const { color, undermin } = getColor(d, thresholds, palette);
      return {
        fillColor: color,
        fillOpacity: (undermin) ? 0 : 0.8,
        color: color,
        weight: 1,
        opacity: 1
      };
    },
    onEachFeature: function(feature, layer) {
      const d = feature.properties.density;
      const cid = feature.properties.emd_nm;
      layer.bindTooltip(`법정 읍면동: ${cid}<br>밀도: <b>${d}</b>`, {sticky: true});
    }
  }).addTo(map);

  
  sggLayer = L.geoJSON(GEOJSON_SGG, {
    style: function(feature) {
      return {
        fillColor: `rgb(0, 0, 0)`,
        fillOpacity: 0,
        color: `rgb(0, 0, 255)`,
        weight: 1,
        opacity: 1,
      };
    },
    interactive: false,
  }).addTo(map);

  sidoLayer = L.geoJSON(GEOJSON_SIDO, {
    style: function(feature) {
      return {
        fillColor: `rgb(0, 0, 0)`,
        fillOpacity: 0,
        color: `rgb(0, 0, 255)`,
        weight: 3,
        opacity: 1,
      };
    },
    interactive: false,
  }).addTo(map);


  // 통계
  document.getElementById('stat-count').textContent = GEOJSON_EMD.features.length.toLocaleString();
  const maxD = Math.max(...GEOJSON_EMD.features.map(f => f.properties.density));
  document.getElementById('stat-max').textContent = maxD.toLocaleString();
}

function buildLegend(thresholds, palette) {
  const container = document.getElementById('legend-content');
  container.innerHTML = '';
  for (let i = 0; i < thresholds.length; i++) {
    const nextVal = i < thresholds.length - 1 ? thresholds[i+1] - 1 : '~';
    const row = document.createElement('div');
    row.className = 'legend-row';
    row.innerHTML = `
      <div class="legend-swatch" style="background:${palette[i]}"></div>
      <span>${thresholds[i]}${nextVal !== '~' ? ' ~ ' + nextVal : ' 이상'}</span>
    `;
    container.appendChild(row);
  }
}

function buildControls(thresholds) {
  const numSteps = thresholds.length;
  document.getElementById('num-steps').value = numSteps;
  const palette = generatePalette(numSteps);
  const container = document.getElementById('thresholds-container');
  container.innerHTML = '';
  for (let i = 0; i < numSteps; i++) {
    const row = document.createElement('div');
    row.className = 'threshold-row';
    row.innerHTML = `
      <div class="swatch" style="background:${palette[i]}"></div>
      <label>${i+1}단계 (이상):</label>
      <input type="number" id="thr-${i}" value="${thresholds[i]}" min="0">
    `;
    container.appendChild(row);
  }
}

function applySettings() {
  const numSteps = parseInt(document.getElementById('num-steps').value);
  let thresholds = [];

  // 현재 입력값 읽기
  const existingInputs = document.querySelectorAll('[id^="thr-"]');
  for (let i = 0; i < existingInputs.length; i++) {
    thresholds.push(parseInt(existingInputs[i].value) || 0);
  }

  // 단계 수가 바뀐 경우 자동 보간
  if (numSteps !== thresholds.length) {
    const oldMax = thresholds[thresholds.length - 1] || 800;
    const oldMin = thresholds[0] || 1;
    thresholds = [];
    for (let i = 0; i < numSteps; i++) {
      const t = numSteps === 1 ? 0 : i / (numSteps - 1);
      thresholds.push(Math.round(oldMin + (oldMax - oldMin) * t));
    }
  }

  currentThresholds = thresholds;
  currentPalette = generatePalette(numSteps);

  buildControls(thresholds);
  buildLayer(currentThresholds, currentPalette);
  buildLegend(currentThresholds, currentPalette);
}

// 초기 렌더링
buildControls(CONFIG.thresholds);
buildLayer(currentThresholds, currentPalette);
buildLegend(currentThresholds, currentPalette);
buildCenterPanel();
buildNth();

// 단계 수 변경시 즉시 컨트롤 재생성
document.getElementById('num-steps').addEventListener('change', function() {
  const n = parseInt(this.value);
  if (n < 2 || n > 20) return;
  const newThresholds = [];
  const oldMin = currentThresholds[0];
  const oldMax = currentThresholds[currentThresholds.length - 1];
  for (let i = 0; i < n; i++) {
    const t = n === 1 ? 0 : i / (n - 1);
    newThresholds.push(Math.round(oldMin + (oldMax - oldMin) * t));
  }
  buildControls(newThresholds);
});
</script>
